<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuga da Mansão Matemática</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-title {
            font-family: 'Fredoka One', cursive;
        }
        
        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(220, 38, 38, 0.5); }
            50% { box-shadow: 0 0 50px rgba(220, 38, 38, 0.9); }
        }
        .animate-pulse-red {
            animation: pulse-red 2s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes unlock {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .unlock-anim {
            animation: unlock 0.6s ease-out forwards;
        }

        /* Room 3 SVG Grid Styles */
        .grid-line {
            stroke: #334155;
            stroke-width: 8;
            stroke-linecap: round;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .grid-line:hover {
            stroke: #64748b;
        }
        .grid-line.active-outer {
            stroke: #38bdf8;
            filter: drop-shadow(0 0 8px #38bdf8);
        }
        .grid-line.active-inner {
            stroke: #ef4444;
            filter: drop-shadow(0 0 8px #ef4444);
        }

        /* Pizza Slice */
        .pizza-slice {
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            transform-origin: 0 0;
        }
        .pizza-slice:hover {
            transform: scale(1.05);
        }
        .pizza-slice.eaten {
            opacity: 0.15;
            transform: scale(0.95);
        }

        /* Bar Chart Styles (Room 18) */
        .bar-transition {
            transition: height 0.3s ease-in-out, background-color 0.3s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900">

    <!-- Header / Progress -->
    <header class="p-4 flex justify-between items-center border-b border-indigo-500/30 bg-slate-900/50 backdrop-blur-md z-10 sticky top-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg border-2 border-indigo-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M2 12h20"/><path d="M12 2v20"/><path d="m4.93 4.93 14.14 14.14"/><path d="m4.93 19.07 14.14-14.14"/></svg>
            </div>
            <h1 class="text-xl md:text-2xl text-indigo-100 tracking-wide">Mansão Matemática</h1>
        </div>
        <div id="progress-container" class="hidden flex flex-col items-end gap-1 w-1/2 max-w-[250px]">
            <span id="progress-text" class="text-slate-300 font-bold text-sm">Sala 1 / 22</span>
            <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden border border-slate-600">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </header>

    <!-- Main Game Area -->
    <main id="game-container" class="flex-grow flex flex-col items-center justify-center p-4 w-full max-w-5xl mx-auto">
        <!-- Content injected by JS -->
    </main>

    <!-- Modal for Feedback -->
    <div id="feedback-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-800 border-2 border-indigo-400 p-8 rounded-2xl max-w-md w-full text-center shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <div id="modal-icon" class="text-6xl mb-4 flex justify-center">🌟</div>
            <h2 id="modal-title" class="text-3xl text-indigo-300 mb-2 font-title">Excelente!</h2>
            <p id="modal-message" class="text-lg text-slate-300 mb-6">Você resolveu o enigma.</p>
            <button id="modal-btn" onclick="nextStage()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-indigo-500/50 transition-all font-title text-xl w-full">
                Próxima Sala ➔
            </button>
        </div>
    </div>

    <script>
        // Game State
        let currentStage = 0;
        
        // Stages 1 to 22 (Base Game)
        let safeDigits = [0, 0, 0, 0];
        const correctDigits = [9, 8, 6, 3]; 
        let pizzaSlices = [false, false, false, false, false, false, false, false]; 
        let outerLinesActive = 0;
        const totalOuterLines = 16; 
        let cauldronVolume = 0;
        let clockTime = { h: 14, m: 45 };
        let chestMoney = 0;
        let areaKeypad = "";
        let phonesPacked = Array(25).fill(false);
        let symGrid = Array(8).fill(false);
        let decimalUnits = { c: 0, d: 0, u: 0 };
        let scaleWeight = 0;
        let cubeVertices = Array(8).fill(false);
        let doorDials = [0, 0, 0, 0];
        const correctDoorDials = [3, 4, 5, 6];
        let multiplesState = Array(12).fill(false); 
        let measuresPool = [{id: 1, text: '150 cm', val: 1.5},{id: 2, text: '0,5 km', val: 500},{id: 3, text: '2 m', val: 2},{id: 4, text: '2500 mm', val: 2.5}];
        let placedMeasures = [null, null, null, null];
        let selectedMeasure = null; 
        let chartBars = [0, 0, 0]; 
        let padLockPath = []; 
        let bossDials = [0, 0]; 

        // Stages 24 to 28 (Desafio Secreto - Hard Mode Prova)
        let hardQ1Input = "";
        let hardQ2Dials = [0, 0];
        let hardQ3Input = "";
        let hardQ4Water = 0;
        let hardQ5Dials = [0, 0, 0];

        // Utility to update stars/progress
        function updateProgress() {
            const progress = document.getElementById('progress-container');
            const pText = document.getElementById('progress-text');
            const pBar = document.getElementById('progress-bar');
            
            if (currentStage > 0 && currentStage <= 22) {
                progress.classList.remove('hidden');
                pText.innerText = `Sala ${currentStage} / 22`;
                pBar.style.width = `${(currentStage / 22) * 100}%`;
                pBar.className = "bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-500";
            } else if (currentStage === 23) {
                // Transition screen, hide progress or show special
                progress.classList.add('hidden');
            } else if (currentStage >= 24 && currentStage <= 28) {
                progress.classList.remove('hidden');
                let hardStageNum = currentStage - 23;
                pText.innerText = `Desafio Secreto ${hardStageNum} / 5`;
                pText.classList.replace('text-slate-300', 'text-red-400');
                pBar.style.width = `${(hardStageNum / 5) * 100}%`;
                pBar.className = "bg-gradient-to-r from-red-600 to-orange-500 h-full transition-all duration-500";
            } else {
                progress.classList.add('hidden');
            }
        }

        // Show Modal
        function showModal(title, message, icon, btnText, isWin = false) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-btn').innerText = btnText;
            
            if (isWin) {
                document.getElementById('modal-btn').setAttribute('onclick', 'resetGame()');
            } else {
                document.getElementById('modal-btn').setAttribute('onclick', 'nextStage()');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function hideModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function nextStage() {
            hideModal();
            currentStage++;
            renderStage();
        }

        function resetGame() {
            hideModal();
            currentStage = 0;
            safeDigits = [0, 0, 0, 0];
            pizzaSlices = [false, false, false, false, false, false, false, false];
            outerLinesActive = 0;
            cauldronVolume = 0;
            clockTime = { h: 14, m: 45 };
            chestMoney = 0;
            areaKeypad = "";
            phonesPacked = Array(25).fill(false);
            symGrid = Array(8).fill(false);
            decimalUnits = { c: 0, d: 0, u: 0 };
            scaleWeight = 0;
            cubeVertices = Array(8).fill(false);
            doorDials = [0, 0, 0, 0];
            multiplesState = Array(12).fill(false);
            measuresPool = [{id: 1, text: '150 cm', val: 1.5}, {id: 2, text: '0,5 km', val: 500}, {id: 3, text: '2 m', val: 2}, {id: 4, text: '2500 mm', val: 2.5}];
            placedMeasures = [null, null, null, null];
            selectedMeasure = null;
            chartBars = [0, 0, 0];
            padLockPath = [];
            bossDials = [0, 0];

            hardQ1Input = "";
            hardQ2Dials = [0, 0];
            hardQ3Input = "";
            hardQ4Water = 0;
            hardQ5Dials = [0, 0, 0];
            
            document.getElementById('progress-text').classList.replace('text-red-400', 'text-slate-300');
            renderStage();
        }

        // -------------------------------------------------------------
        // RENDER LOGIC
        // -------------------------------------------------------------
        const container = document.getElementById('game-container');

        function renderStage() {
            updateProgress();
            container.innerHTML = ''; // clear

            switch(currentStage) {
                case 0: renderIntro(); break;
                case 1: renderRoom1(); break;
                case 2: renderRoom2(); break;
                case 3: renderRoom3(); break;
                case 4: renderRoom4(); break;
                case 5: renderRoom5(); break;
                case 6: renderRoom6(); break;
                case 7: renderRoom7(); break;
                case 8: renderRoom8(); break;
                case 9: renderRoom9(); break;
                case 10: renderRoom10(); break;
                case 11: renderRoom11(); break;
                case 12: renderRoom12(); break;
                case 13: renderRoom13(); break;
                case 14: renderRoom14(); break;
                case 15: renderRoom15(); break;
                case 16: renderRoom16(); break;
                case 17: renderRoom17(); break;
                case 18: renderRoom18(); break;
                case 19: renderRoom19(); break;
                case 20: renderRoom20(); break;
                case 21: renderRoom21(); break;
                case 22: renderRoom22(); break;
                // Transition
                case 23: renderSecretTransition(); break;
                // Hard Mode
                case 24: renderHardQ1(); break;
                case 25: renderHardQ2(); break;
                case 26: renderHardQ3(); break;
                case 27: renderHardQ4(); break;
                case 28: renderHardQ5(); break;
                // Win
                case 29: renderWin(); break;
            }
        }

        // STAGE 0: INTRO
        function renderIntro() {
            container.innerHTML = `
                <div class="text-center animate-float max-w-2xl">
                    <div class="text-8xl mb-6">🏰</div>
                    <h1 class="text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-6 font-title drop-shadow-lg">
                        Fuga da Mansão Matemática
                    </h1>
                    <p class="text-xl md:text-2xl text-slate-300 mb-10 leading-relaxed font-bold">
                        22 Fases + Desafio Secreto Final
                    </p>
                    <p class="text-lg md:text-xl text-slate-400 mb-10 leading-relaxed">
                        Você precisará de raciocínio afiado para superar os 22 enigmas do 5º ano e chegar à sala secreta final.
                    </p>
                    <button onclick="nextStage()" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-title text-2xl py-4 px-12 rounded-full shadow-[0_0_20px_rgba(79,70,229,0.5)] hover:shadow-[0_0_30px_rgba(79,70,229,0.8)] transition-all transform hover:scale-105 active:scale-95">
                        ENTRAR NA MANSÃO ➔
                    </button>
                </div>
            `;
        }

        // ======================= SALAS 1 a 22 (REGULARES) ======================= //

        function renderRoom1() {
            let dialsHTML = '';
            for(let i=0; i<4; i++) {
                dialsHTML += `
                    <div class="flex flex-col items-center bg-slate-800 p-3 md:p-6 rounded-2xl border-4 border-slate-700 shadow-inner w-20 md:w-28">
                        <button onclick="changeDigit(${i}, 1)" class="w-full h-10 md:h-12 bg-slate-700 hover:bg-indigo-600 rounded-t-lg flex items-center justify-center text-2xl transition-colors active:bg-indigo-400">▲</button>
                        <div class="h-20 md:h-24 w-full flex items-center justify-center bg-slate-900 border-y-2 border-slate-950 shadow-inner">
                            <span id="digit-${i}" class="text-4xl md:text-6xl font-title text-indigo-400 font-bold">${safeDigits[i]}</span>
                        </div>
                        <button onclick="changeDigit(${i}, -1)" class="w-full h-10 md:h-12 bg-slate-700 hover:bg-indigo-600 rounded-b-lg flex items-center justify-center text-2xl transition-colors active:bg-indigo-400">▼</button>
                    </div>
                `;
            }
            container.innerHTML = `
                <div class="w-full max-w-3xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 shadow-2xl text-center mb-10 w-full relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
                        <h2 class="text-3xl text-indigo-300 font-title mb-4 flex items-center justify-center gap-3"><span class="text-4xl">🧮</span> O Cofre dos Números</h2>
                        <p class="text-lg md:text-xl text-slate-200">
                            A porta está trancada por um cofre de 4 dígitos. A dica diz:<br>
                            <span class="text-yellow-400 font-bold block mt-3 text-2xl">"Forme o MAIOR número <u class="text-red-400">ÍMPAR</u> possível usando apenas os algarismos: 8, 3, 9 e 6."</span>
                        </p>
                    </div>
                    <div id="safe-container" class="flex gap-2 md:gap-6 p-6 md:p-10 bg-slate-700 rounded-3xl border-8 border-slate-800 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                        ${dialsHTML}
                    </div>
                    <div id="room1-error" class="h-8 mt-6 text-red-400 font-bold text-lg opacity-0 transition-opacity">Senha Incorreta. Tente novamente!</div>
                </div>
            `;
        }
        function changeDigit(index, delta) {
            safeDigits[index] += delta;
            if (safeDigits[index] > 9) safeDigits[index] = 0;
            if (safeDigits[index] < 0) safeDigits[index] = 9;
            const el = document.getElementById(`digit-${index}`);
            el.innerText = safeDigits[index];
            el.style.transform = 'scale(1.2)';
            setTimeout(() => el.style.transform = 'scale(1)', 150);
            checkRoom1();
        }
        function checkRoom1() {
            if (safeDigits.every((val, index) => val === correctDigits[index])) {
                document.getElementById('room1-error').classList.add('opacity-0');
                const safeBox = document.getElementById('safe-container');
                safeBox.classList.add('unlock-anim', 'border-green-500');
                safeBox.style.boxShadow = '0 0 50px rgba(34, 197, 94, 0.6)';
                setTimeout(() => showModal("Cofre Aberto!", "Incrível! 9.863 é o maior número ímpar possível.", "🗝️", "Próxima Sala ➔"), 800);
            }
        }

        function renderRoom2() {
            let slicesSVG = '';
            for(let i=0; i<8; i++) {
                const startAngle = (i * 45) * Math.PI / 180; const endAngle = ((i+1) * 45) * Math.PI / 180;
                const x1 = Math.sin(startAngle) * 100; const y1 = -Math.cos(startAngle) * 100;
                const x2 = Math.sin(endAngle) * 100; const y2 = -Math.cos(endAngle) * 100;
                slicesSVG += `
                    <g onclick="togglePizza(${i})" class="pizza-slice ${pizzaSlices[i] ? 'eaten' : ''}" id="slice-${i}">
                        <path d="M0,0 L${x1},${y1} A100,100 0 0,1 ${x2},${y2} Z" fill="#d97706" stroke="#b45309" stroke-width="2"/>
                        <path d="M0,0 L${x1*0.85},${y1*0.85} A85,85 0 0,1 ${x2*0.85},${y2*0.85} Z" fill="#fbbf24"/>
                        <circle cx="${Math.sin(startAngle + 0.3)*60}" cy="${-Math.cos(startAngle + 0.3)*60}" r="8" fill="#ef4444" />
                    </g>
                `;
            }
            container.innerHTML = `
                <div class="w-full max-w-3xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 shadow-2xl text-center mb-8 w-full">
                        <h2 class="text-3xl text-orange-400 font-title mb-4 flex items-center justify-center gap-3"><span class="text-4xl">👻</span> A Cantina Fantasma</h2>
                        <p class="text-lg md:text-xl text-slate-200">Deixe <span class="text-yellow-400 font-bold">exatamente a METADE</span> da pizza para o fantasma.</p>
                    </div>
                    <div class="relative w-64 h-64 md:w-80 md:h-80 mb-8 bg-slate-800 rounded-full shadow-[0_0_40px_rgba(0,0,0,0.5)] flex items-center justify-center">
                        <svg viewBox="-110 -110 220 220" class="w-full h-full drop-shadow-xl" id="pizza-container">${slicesSVG}</svg>
                        <div class="absolute w-4 h-4 bg-slate-900 rounded-full"></div>
                    </div>
                    <button onclick="checkRoom2()" class="bg-orange-600 hover:bg-orange-500 text-white font-title text-xl py-3 px-10 rounded-full shadow-lg transition-transform hover:scale-105">Servir o Fantasma</button>
                    <div id="room2-error" class="h-8 mt-4 text-red-400 font-bold text-lg opacity-0 transition-opacity">O fantasma não gostou. Isso não é a metade!</div>
                </div>
            `;
        }
        function togglePizza(index) {
            pizzaSlices[index] = !pizzaSlices[index];
            const el = document.getElementById(`slice-${index}`);
            if (pizzaSlices[index]) el.classList.add('eaten'); else el.classList.remove('eaten');
            document.getElementById('room2-error').classList.add('opacity-0');
        }
        function checkRoom2() {
            if (pizzaSlices.filter(v => v).length === 4) {
                document.getElementById('pizza-container').classList.add('unlock-anim');
                setTimeout(() => showModal("Satisfeito!", "Você deixou a METADE (4/8 = 1/2) da pizza.", "🍕", "Próxima Sala ➔"), 600);
            } else {
                document.getElementById('room2-error').classList.remove('opacity-0');
                document.getElementById('pizza-container').classList.add('shake');
                setTimeout(() => document.getElementById('pizza-container').classList.remove('shake'), 400);
            }
        }

        function renderRoom3() {
            const cols = 5; const rows = 3; const cellSize = 80;
            let linesSVG = '';
            for(let r=0; r<rows; r++) for(let c=0; c<cols; c++) linesSVG += `<rect x="${c*cellSize}" y="${r*cellSize}" width="${cellSize}" height="${cellSize}" fill="#1e293b" stroke="#0f172a" stroke-width="2" />`;
            for(let r=0; r<=rows; r++) for(let c=0; c<cols; c++) linesSVG += `<line x1="${c*cellSize}" y1="${r*cellSize}" x2="${(c+1)*cellSize}" y2="${r*cellSize}" class="grid-line" id="h-${r}-${c}" data-type="${(r===0||r===rows)?'outer':'inner'}" data-active="false" onclick="toggleGridLine('h-${r}-${c}')" />`;
            for(let c=0; c<=cols; c++) for(let r=0; r<rows; r++) linesSVG += `<line x1="${c*cellSize}" y1="${r*cellSize}" x2="${c*cellSize}" y2="${(r+1)*cellSize}" class="grid-line" id="v-${c}-${r}" data-type="${(c===0||c===cols)?'outer':'inner'}" data-active="false" onclick="toggleGridLine('v-${c}-${r}')" />`;
            container.innerHTML = `
                <div class="w-full max-w-4xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 shadow-2xl text-center mb-6 w-full">
                        <h2 class="text-3xl text-teal-300 font-title mb-4 flex items-center justify-center gap-3"><span class="text-4xl">⚡</span> O Campo de Força</h2>
                        <p class="text-lg md:text-xl text-slate-200">O terreno tem 5m de comprimento por 3m de largura. Clique nas linhas para energizar <strong class="text-yellow-400 uppercase">apenas o perímetro</strong>.</p>
                    </div>
                    <div class="flex flex-col items-center bg-slate-900 p-4 rounded-3xl border-4 border-slate-700 shadow-2xl">
                        <div class="flex justify-between w-full px-4 mb-4 text-slate-400 font-bold">Energizados: <span id="perimeter-counter" class="text-teal-400 text-lg">0</span> / 16</div>
                        <div class="relative overflow-x-auto w-full flex justify-center py-4"><svg width="${cols*cellSize}" height="${rows*cellSize}" viewBox="-10 -10 ${(cols*cellSize)+20} ${(rows*cellSize)+20}" class="max-w-full" id="grid-svg">${linesSVG}</svg></div>
                    </div>
                    <div id="room3-error" class="mt-4 bg-red-900/50 border border-red-500 text-red-200 px-6 py-3 rounded-lg font-bold opacity-0 transition-opacity flex items-center gap-2"><span>⚠️</span> Cuidado! Você clicou na área interna.</div>
                </div>
            `;
        }
        function toggleGridLine(id) {
            const line = document.getElementById(id);
            if (line.getAttribute('data-type') === 'inner') {
                line.classList.add('active-inner'); document.getElementById('room3-error').classList.remove('opacity-0'); document.getElementById('grid-svg').classList.add('shake');
                setTimeout(() => { line.classList.remove('active-inner'); document.getElementById('grid-svg').classList.remove('shake'); setTimeout(() => document.getElementById('room3-error').classList.add('opacity-0'), 2000); }, 500); return;
            }
            if (line.getAttribute('data-active') === 'true') { line.setAttribute('data-active', 'false'); line.classList.remove('active-outer'); outerLinesActive--; }
            else { line.setAttribute('data-active', 'true'); line.classList.add('active-outer'); outerLinesActive++; }
            document.getElementById('perimeter-counter').innerText = outerLinesActive;
            if (outerLinesActive === totalOuterLines) {
                document.getElementById('grid-svg').classList.add('unlock-anim');
                document.querySelectorAll('.grid-line[data-type="outer"]').forEach(el => { el.style.stroke = '#2dd4bf'; el.style.filter = 'drop-shadow(0 0 12px #2dd4bf)'; });

        }
        function checkHardQ5() {
            // Múltiplos de 5 entre 100 e 110: apenas 105. Soma: 1+0+5=6. Senha: 105.
            if (hardQ5Dials[0] === 1 && hardQ5Dials[1] === 0 && hardQ5Dials[2] === 5) {
                setTimeout(() => currentStage=29, 200); setTimeout(() => renderStage(), 200);
            } else { document.getElementById('hq5-error').classList.remove('opacity-0'); setTimeout(() => document.getElementById('hq5-error').classList.add('opacity-0'), 4000); }
        }

        // ======================= WIN SCREEN (STAGE 29) ======================= //

        function renderWin() {
            document.getElementById('progress-container').classList.add('hidden');
            container.innerHTML = `
                <div class="text-center max-w-3xl bg-slate-800/90 p-10 rounded-3xl border-4 border-yellow-500 shadow-[0_0_80px_rgba(234,179,8,0.5)] relative overflow-hidden">
                    <div class="absolute inset-0 pointer-events-none opacity-50 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-500/30 via-transparent to-transparent"></div>
                    <div class="text-8xl mb-6 animate-float">🎓🏆🎆</div>
                    <h1 class="text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-6 font-title drop-shadow-md">
                        VOCÊ VENCEU!
                    </h1>
                    <p class="text-xl md:text-2xl text-slate-300 mb-8 leading-relaxed font-bold">
                        A Mansão Inteira foi desvendada!
                    </p>
                    <p class="text-lg md:text-xl text-slate-400 mb-10 leading-relaxed">
                        Parabéns! Sua lógica em frações, porcentagens, áreas e leitura de problemas o transformou na <strong class="text-yellow-400">Lenda da Matemática do 5º ano!</strong>
                    </p>
                    <button onclick="resetGame()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-title text-xl py-4 px-12 rounded-full shadow-[0_0_30px_rgba(34,197,94,0.6)] hover:shadow-[0_0_50px_rgba(34,197,94,0.8)] transition-all transform hover:scale-105 active:scale-95">
                        JOGAR NOVAMENTE ↺
                    </button>
                </div>
            `;
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#facc15', '#38bdf8', '#fbbf24', '#a855f7', '#4ade80', '#ef4444'];
            for(let i=0; i<120; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed'; conf.style.width = Math.random() * 12 + 6 + 'px'; conf.style.height = Math.random() * 24 + 12 + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.top = '-20px'; conf.style.left = Math.random() * 100 + 'vw'; conf.style.opacity = Math.random() + 0.5;
                conf.style.transform = `rotate(${Math.random() * 360}deg)`; conf.style.zIndex = 100;
                conf.style.transition = `top ${Math.random() * 3 + 2}s linear, transform ${Math.random() * 3 + 2}s ease-in-out`;
                document.body.appendChild(conf);
                setTimeout(() => { conf.style.top = '120vh'; conf.style.transform = `rotate(${Math.random() * 720}deg) translateX(${Math.random() * 150 - 75}px)`; }, 50);
                setTimeout(() => conf.remove(), 5000);
            }
        }

        // Inicia o Jogo
        renderStage();

    </script>
</body>
</html>
