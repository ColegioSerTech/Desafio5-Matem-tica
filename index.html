<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuga da Mansão Matemática</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-title {
            font-family: 'Fredoka One', cursive;
        }
        
        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes unlock {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .unlock-anim {
            animation: unlock 0.6s ease-out forwards;
        }

        /* Room 3 SVG Grid Styles */
        .grid-line {
            stroke: #334155;
            stroke-width: 8;
            stroke-linecap: round;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .grid-line:hover {
            stroke: #64748b;
        }
        .grid-line.active-outer {
            stroke: #38bdf8;
            filter: drop-shadow(0 0 8px #38bdf8);
        }
        .grid-line.active-inner {
            stroke: #ef4444;
            filter: drop-shadow(0 0 8px #ef4444);
        }

        /* Pizza Slice */
        .pizza-slice {
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            transform-origin: 0 0;
        }
        .pizza-slice:hover {
            transform: scale(1.05);
        }
        .pizza-slice.eaten {
            opacity: 0.15;
            transform: scale(0.95);
        }

        /* Bar Chart Styles (Room 18) */
        .bar-transition {
            transition: height 0.3s ease-in-out, background-color 0.3s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900">

    <!-- Header / Progress -->
    <header class="p-4 flex justify-between items-center border-b border-indigo-500/30 bg-slate-900/50 backdrop-blur-md z-10 sticky top-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg border-2 border-indigo-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M2 12h20"/><path d="M12 2v20"/><path d="m4.93 4.93 14.14 14.14"/><path d="m4.93 19.07 14.14-14.14"/></svg>
            </div>
            <h1 class="text-xl md:text-2xl text-indigo-100 tracking-wide">Mansão Matemática</h1>
        </div>
        <div id="progress-container" class="hidden flex flex-col items-end gap-1 w-1/3 max-w-[200px]">
            <span id="progress-text" class="text-slate-300 font-bold text-sm">Sala 1 / 20</span>
            <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden border border-slate-600">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </header>

    <!-- Main Game Area -->
    <main id="game-container" class="flex-grow flex flex-col items-center justify-center p-4 w-full max-w-5xl mx-auto">
        <!-- Content injected by JS -->
    </main>

    <!-- Modal for Feedback -->
    <div id="feedback-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-800 border-2 border-indigo-400 p-8 rounded-2xl max-w-md w-full text-center shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <div id="modal-icon" class="text-6xl mb-4 flex justify-center">🌟</div>
            <h2 id="modal-title" class="text-3xl text-indigo-300 mb-2 font-title">Excelente!</h2>
            <p id="modal-message" class="text-lg text-slate-300 mb-6">Você resolveu o enigma.</p>
            <button id="modal-btn" onclick="nextStage()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-indigo-500/50 transition-all font-title text-xl w-full">
                Próxima Sala ➔
            </button>
        </div>
    </div>

    <script>
        // Game State
        let currentStage = 0;
        const totalStages = 20;

        // Room 1 State (Cofre Dificultado)
        let safeDigits = [0, 0, 0, 0];
        const correctDigits = [9, 8, 6, 3]; // Maior ÍMPAR com 8,3,9,6

        // Room 2 State (Pizza)
        let pizzaSlices = [false, false, false, false, false, false, false, false]; 

        // Room 3 State (Perimeter Grid)
        let outerLinesActive = 0;
        const totalOuterLines = 16; 

        // Existing Rooms States
        let cauldronVolume = 0;
        let clockTime = { h: 14, m: 45 };
        let chestMoney = 0;
        let areaKeypad = "";
        let phonesPacked = Array(25).fill(false);
        let symGrid = Array(8).fill(false);
        let decimalUnits = { c: 0, d: 0, u: 0 };
        let scaleWeight = 0;
        let cubeVertices = Array(8).fill(false);
        let doorDials = [0, 0, 0, 0];
        const correctDoorDials = [3, 4, 5, 6];
        let multiplesState = Array(12).fill(false); // Sala 16

        // New Rooms States (17 to 20)
        let measuresPool = [
            {id: 1, text: '150 cm', val: 1.5},
            {id: 2, text: '0,5 km', val: 500},
            {id: 3, text: '2 m', val: 2},
            {id: 4, text: '2500 mm', val: 2.5}
        ];
        let placedMeasures = [null, null, null, null];
        let selectedMeasure = null; // Para a mecânica click-to-move da Sala 17

        let chartBars = [0, 0, 0]; // Valores atuais da Sala 18
        
        let padLockPath = []; // Setas digitadas na Sala 19
        
        let bossDials = [0, 0]; // Dials da Sala 20 (Criptograma)

        // Utility to update stars/progress
        function updateProgress() {
            const progress = document.getElementById('progress-container');
            if (currentStage > 0 && currentStage <= totalStages) {
                progress.classList.remove('hidden');
                document.getElementById('progress-text').innerText = `Sala ${currentStage} / ${totalStages}`;
                const pct = ((currentStage - 1) / totalStages) * 100;
                document.getElementById('progress-bar').style.width = `${pct}%`;
            } else {
                progress.classList.add('hidden');
            }
        }

        // Show Modal
        function showModal(title, message, icon, btnText, isWin = false) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-btn').innerText = btnText;
            
            if (isWin) {
                document.getElementById('modal-btn').setAttribute('onclick', 'resetGame()');
            } else {
                document.getElementById('modal-btn').setAttribute('onclick', 'nextStage()');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function hideModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function nextStage() {
            hideModal();
            currentStage++;
            renderStage();
        }

        function resetGame() {
            hideModal();
            currentStage = 0;
            safeDigits = [0, 0, 0, 0];
            pizzaSlices = [false, false, false, false, false, false, false, false];
            outerLinesActive = 0;
            cauldronVolume = 0;
            clockTime = { h: 14, m: 45 };
            chestMoney = 0;
            areaKeypad = "";
            phonesPacked = Array(25).fill(false);
            symGrid = Array(8).fill(false);
            decimalUnits = { c: 0, d: 0, u: 0 };
            scaleWeight = 0;
            cubeVertices = Array(8).fill(false);
            doorDials = [0, 0, 0, 0];
            multiplesState = Array(12).fill(false);
            
            measuresPool = [{id: 1, text: '150 cm', val: 1.5}, {id: 2, text: '0,5 km', val: 500}, {id: 3, text: '2 m', val: 2}, {id: 4, text: '2500 mm', val: 2.5}];
            placedMeasures = [null, null, null, null];
            selectedMeasure = null;
            chartBars = [0, 0, 0];
            padLockPath = [];
            bossDials = [0, 0];
            
            renderStage();
        }

        // -------------------------------------------------------------
        // RENDER LOGIC
        // -------------------------------------------------------------
        const container = document.getElementById('game-container');

        function renderStage() {
            updateProgress();
            container.innerHTML = ''; // clear

            switch(currentStage) {
                case 0: renderIntro(); break;
                case 1: renderRoom1(); break;
                case 2: renderRoom2(); break;
                case 3: renderRoom3(); break;
                case 4: renderRoom4(); break;
                case 5: renderRoom5(); break;
                case 6: renderRoom6(); break;
                case 7: renderRoom7(); break;
                case 8: renderRoom8(); break;
                case 9: renderRoom9(); break;
                case 10: renderRoom10(); break;
                case 11: renderRoom11(); break;
                case 12: renderRoom12(); break;
                case 13: renderRoom13(); break;
                case 14: renderRoom14(); break;
                case 15: renderRoom15(); break;
                case 16: renderRoom16(); break;
                case 17: renderRoom17(); break;
                case 18: renderRoom18(); break;
                case 19: renderRoom19(); break;
                case 20: renderRoom20(); break;
                case 21: renderWin(); break;
            }
        }

        // STAGE 0: INTRO
        function renderIntro() {
            container.innerHTML = `
                <div class="text-center animate-float max-w-2xl">
                    <div class="text-8xl mb-6">🏰</div>
                    <h1 class="text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-6 font-title drop-shadow-lg">
                        Fuga da Mansão Matemática
                    </h1>
                    <p class="text-xl md:text-2xl text-slate-300 mb-10 leading-relaxed font-bold">
                        Modo Difícil e Expandido! (20 Desafios)
                    </p>
                    <p class="text-lg md:text-xl text-slate-400 mb-10 leading-relaxed">
                        Você precisará de muito raciocínio lógico para superar os 20 enigmas do 5º ano e escapar.
                    </p>
                    <button onclick="nextStage()" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-title text-2xl py-4 px-12 rounded-full shadow-[0_0_20px_rgba(79,70,229,0.5)] hover:shadow-[0_0_30px_rgba(79,70,229,0.8)] transition-all transform hover:scale-105 active:scale-95">
                        ENTRAR NA MANSÃO ➔
                    </button>
                </div>
            `;
        }

        // ======================= SALAS 1 a 16 (EXISTENTES) ======================= //

        function renderRoom1() {
            let dialsHTML = '';
            for(let i=0; i<4; i++) {
                dialsHTML += `
                    <div class="flex flex-col items-center bg-slate-800 p-3 md:p-6 rounded-2xl border-4 border-slate-700 shadow-inner w-20 md:w-28">
                        <button onclick="changeDigit(${i}, 1)" class="w-full h-10 md:h-12 bg-slate-700 hover:bg-indigo-600 rounded-t-lg flex items-center justify-center text-2xl transition-colors active:bg-indigo-400">▲</button>
                        <div class="h-20 md:h-24 w-full flex items-center justify-center bg-slate-900 border-y-2 border-slate-950 shadow-inner">
                            <span id="digit-${i}" class="text-4xl md:text-6xl font-title text-indigo-400 font-bold">${safeDigits[i]}</span>
                        </div>
                        <button onclick="changeDigit(${i}, -1)" class="w-full h-10 md:h-12 bg-slate-700 hover:bg-indigo-600 rounded-b-lg flex items-center justify-center text-2xl transition-colors active:bg-indigo-400">▼</button>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="w-full max-w-3xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 shadow-2xl text-center mb-10 w-full relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
                        <h2 class="text-3xl text-indigo-300 font-title mb-4 flex items-center justify-center gap-3"><span class="text-4xl">🧮</span> O Cofre dos Números</h2>
                        <p class="text-lg md:text-xl text-slate-200">
                            A porta está trancada por um cofre de 4 dígitos. A dica diz:<br>
                            <span class="text-yellow-400 font-bold block mt-3 text-2xl">"Forme o MAIOR número <u class="text-red-400">ÍMPAR</u> possível usando apenas os algarismos: 8, 3, 9 e 6."</span>
                        </p>
                    </div>
                    <div id="safe-container" class="flex gap-2 md:gap-6 p-6 md:p-10 bg-slate-700 rounded-3xl border-8 border-slate-800 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                        ${dialsHTML}
                    </div>
                    <div id="room1-error" class="h-8 mt-6 text-red-400 font-bold text-lg opacity-0 transition-opacity">
                        Senha Incorreta. Tente novamente!
                    </div>
                </div>
            `;
        }

        function changeDigit(index, delta) {
            safeDigits[index] += delta;
            if (safeDigits[index] > 9) safeDigits[index] = 0;
            if (safeDigits[index] < 0) safeDigits[index] = 9;
            const el = document.getElementById(`digit-${index}`);
            el.innerText = safeDigits[index];
            el.style.transform = 'scale(1.2)';
            setTimeout(() => el.style.transform = 'scale(1)', 150);
            checkRoom1();
        }

        function checkRoom1() {
            const isCorrect = safeDigits.every((val, index) => val === correctDigits[index]);
            const errorText = document.getElementById('room1-error');
            const safeBox = document.getElementById('safe-container');
            
            if (isCorrect) {
                errorText.classList.add('opacity-0');
                safeBox.classList.add('unlock-anim', 'border-green-500');
                safeBox.style.boxShadow = '0 0 50px rgba(34, 197, 94, 0.6)';
                setTimeout(() => showModal("Cofre Aberto!", "Incrível! 9.863 é o maior número ímpar que pode ser formado, pois precisa terminar no 3. Você conseguiu a primeira chave!", "🗝️", "Próxima Sala ➔"), 800);
            } else {
                errorText.classList.add('opacity-0');
            }
        }

        function renderRoom2() {
            let slicesSVG = '';
            for(let i=0; i<8; i++) {
                const startAngle = (i * 45) * Math.PI / 180;
                const endAngle = ((i+1) * 45) * Math.PI / 180;
                const x1 = Math.sin(startAngle) * 100;
                const y1 = -Math.cos(startAngle) * 100;
                const x2 = Math.sin(endAngle) * 100;
                const y2 = -Math.cos(endAngle) * 100;
                const pathData = `M0,0 L${x1},${y1} A100,100 0 0,1 ${x2},${y2} Z`;
                
                slicesSVG += `
                    <g onclick="togglePizza(${i})" class="pizza-slice ${pizzaSlices[i] ? 'eaten' : ''}" id="slice-${i}">
                        <path d="${pathData}" fill="#d97706" stroke="#b45309" stroke-width="2"/>
                        <path d="M0,0 L${x1*0.85},${y1*0.85} A85,85 0 0,1 ${x2*0.85},${y2*0.85} Z" fill="#fbbf24"/>
                        <circle cx="${Math.sin(startAngle + 0.3)*60}" cy="${-Math.cos(startAngle + 0.3)*60}" r="8" fill="#ef4444" />
                        <circle cx="${Math.sin(endAngle - 0.2)*75}" cy="${-Math.cos(endAngle - 0.2)*75}" r="6" fill="#dc2626" />
                    </g>
                `;
            }

            container.innerHTML = `
                <div class="w-full max-w-3xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 shadow-2xl text-center mb-8 w-full relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-500 to-yellow-500"></div>
                        <h2 class="text-3xl text-orange-400 font-title mb-4 flex items-center justify-center gap-3"><span class="text-4xl">👻</span> A Cantina Fantasma</h2>
                        <p class="text-lg md:text-xl text-slate-200">
                            Um fantasma faminto bloqueia a passagem! Ele pediu uma pizza de 8 pedaços, mas quer que você deixe <span class="text-yellow-400 font-bold">exatamente a METADE</span> para ele.<br>
                            Clique nas fatias para simular o que você vai comer.
                        </p>
                    </div>
                    <div class="relative w-64 h-64 md:w-80 md:h-80 mb-8 bg-slate-800 rounded-full shadow-[0_0_40px_rgba(0,0,0,0.5)] border-4 border-slate-700 flex items-center justify-center">
                        <svg viewBox="-110 -110 220 220" class="w-full h-full drop-shadow-xl" id="pizza-container">${slicesSVG}</svg>
                        <div class="absolute w-4 h-4 bg-slate-900 rounded-full"></div>
                    </div>
                    <button onclick="checkRoom2()" class="bg-orange-600 hover:bg-orange-500 text-white font-title text-xl py-3 px-10 rounded-full shadow-lg transition-transform hover:scale-105">Servir o Fantasma</button>
                    <div id="room2-error" class="h-8 mt-4 text-red-400 font-bold text-lg opacity-0 transition-opacity">O fantasma não gostou. Isso não é a metade!</div>
                </div>
            `;
        }

        function togglePizza(index) {
            pizzaSlices[index] = !pizzaSlices[index];
            const sliceEl = document.getElementById(`slice-${index}`);
            if (pizzaSlices[index]) sliceEl.classList.add('eaten');
            else sliceEl.classList.remove('eaten');
            document.getElementById('room2-error').classList.add('opacity-0');
        }

        function checkRoom2() {
            const eatenCount = pizzaSlices.filter(v => v).length;
            if (eatenCount === 4) {
                document.getElementById('pizza-container').classList.add('unlock-anim');
                setTimeout(() => showModal("Fantasma Satisfeito!", "Você acertou! Deixar 4 pedaços de 8 (4/8) é exatamente o mesmo que deixar a METADE (1/2) da pizza.", "🍕", "Próxima Sala ➔"), 600);
            } else {
                const errorText = document.getElementById('room2-error');
                errorText.innerText = eatenCount < 4 ? "Você não comeu a metade ainda. O fantasma quer exatamente meia pizza!" : "Você comeu demais! O fantasma ficou furioso.";
                errorText.classList.remove('opacity-0');
                const pizzaC = document.getElementById('pizza-container');
                pizzaC.classList.add('shake');
                setTimeout(() => pizzaC.classList.remove('shake'), 400);
            }
        }

        function renderRoom3() {
            const cols = 5; const rows = 3; const cellSize = 80;
            const width = cols * cellSize; const height = rows * cellSize;
            
            let linesSVG = '';
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    linesSVG += `<rect x="${c*cellSize}" y="${r*cellSize}" width="${cellSize}" height="${cellSize}" fill="#1e293b" stroke="#0f172a" stroke-width="2" />`;
                }
            }
            for(let r=0; r<=rows; r++) {
                for(let c=0; c<cols; c++) {
                    const isOuter = (r === 0 || r === rows);
                    const id = `h-${r}-${c}`;
                    linesSVG += `<line x1="${c*cellSize}" y1="${r*cellSize}" x2="${(c+1)*cellSize}" y2="${r*cellSize}" class="grid-line" id="${id}" data-type="${isOuter ? 'outer' : 'inner'}" data-active="false" onclick="toggleGridLine('${id}')" />`;
                }
            }
            for(let c=0; c<=cols; c++) {
                for(let r=0; r<rows; r++) {
                    const isOuter = (c === 0 || c === cols);
                    const id = `v-${c}-${r}`;
                    linesSVG += `<line x1="${c*cellSize}" y1="${r*cellSize}" x2="${c*cellSize}" y2="${(r+1)*cellSize}" class="grid-line" id="${id}" data-type="${isOuter ? 'outer' : 'inner'}" data-active="false" onclick="toggleGridLine('${id}')" />`;
                }
            }

            let dots = '';
            for(let r=0; r<=rows; r++) {
                for(let c=0; c<=cols; c++) {
                    dots += `<circle cx="${c*cellSize}" cy="${r*cellSize}" r="4" fill="#475569" />`;
                }
            }

            container.innerHTML = `
                <div class="w-full max-w-4xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 shadow-2xl text-center mb-6 w-full relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 to-emerald-500"></div>
                        <h2 class="text-3xl text-teal-300 font-title mb-4 flex items-center justify-center gap-3"><span class="text-4xl">⚡</span> O Campo de Força</h2>
                        <p class="text-lg md:text-xl text-slate-200">
                            A saída está além deste terreno retangular de <span class="text-teal-400 font-bold">5m de comprimento por 3m de largura</span>.<br>
                            Para ativar o portal, clique nas linhas para energizar <strong class="text-yellow-400 uppercase border-b-2 border-yellow-400">apenas o perímetro</strong> do terreno!
                        </p>
                    </div>
                    <div class="flex flex-col items-center bg-slate-900 p-4 md:p-8 rounded-3xl border-4 border-slate-700 shadow-2xl">
                        <div class="flex justify-between w-full px-4 mb-4 text-slate-400 font-bold text-sm uppercase tracking-wider">
                            <span>Energizados: <span id="perimeter-counter" class="text-teal-400 text-lg">0</span> / 16</span>
                        </div>
                        <div class="relative overflow-x-auto w-full flex justify-center py-4">
                            <svg width="${width}" height="${height}" viewBox="-10 -10 ${width+20} ${height+20}" class="max-w-full drop-shadow-2xl" id="grid-svg">
                                ${linesSVG}
                                ${dots}
                            </svg>
                        </div>
                    </div>
                    <div id="room3-error" class="mt-4 bg-red-900/50 border border-red-500 text-red-200 px-6 py-3 rounded-lg font-bold text-lg opacity-0 transition-opacity flex items-center gap-2">
                        <span>⚠️</span> Cuidado! Você clicou na área interna. O PERÍMETRO é apenas o contorno (borda)!
                    </div>
                </div>
            `;
        }

        function toggleGridLine(id) {
            const line = document.getElementById(id);
            const type = line.getAttribute('data-type');
            const isActive = line.getAttribute('data-active') === 'true';
            const errorMsg = document.getElementById('room3-error');
            const svgBox = document.getElementById('grid-svg');

            if (type === 'inner') {
                line.classList.add('active-inner');

            if (selectedMeasure !== null) {
                // Find in pool
                let poolIdx = measuresPool.findIndex(m => m.id === selectedMeasure);

                    // Put existing back to pool if slot is occupied
                    if (placedMeasures[index] !== null) {
                        measuresPool.push(placedMeasures[index]);
                    }
                    placedMeasures[index] = measuresPool[poolIdx];
                    measuresPool.splice(poolIdx, 1);
                    selectedMeasure = null;

                // Clicked an occupied slot without having something selected -> Return to pool
                measuresPool.push(placedMeasures[index]);
                placedMeasures[index] = null;
            }
            renderRoom17();
        }

            // Check if all slots are filled
            if (placedMeasures.some(m => m === null)) {

                            Ajuste as colunas do gráfico para refletirem exatamente os dados da tabela de colheita.
                        </p>
                        <div class="bg-slate-900 border-2 border-slate-700 rounded-xl p-4 mt-4 mx-auto max-w-sm">
                            <table class="w-full text-left text-slate-200">
                                <tr><th class="py-1">Fruta</th><th class="py-1">Quantidade</th></tr>
                                <tr><td class="text-red-400 font-bold py-1">Maçãs</td><td class="py-1">30</td></tr>
                                <tr><td class="text-yellow-400 font-bold py-1">Bananas</td><td class="py-1">10</td></tr>
                                <tr><td class="text-orange-400 font-bold py-1">Laranjas</td><td class="py-1">40</td></tr>
                            </table>
                        </div>
                    </div>

                    <div class="flex gap-4 md:gap-12 bg-slate-900 p-6 md:p-10 rounded-3xl shadow-2xl border-4 border-slate-700">
                        ${barsHTML}
                    </div>

                    <button onclick="checkRoom18()" class="mt-8 bg-yellow-600 hover:bg-yellow-500 text-slate-900 font-title text-xl py-3 px-10 rounded-full shadow-lg">Analisar Gráfico</button>
                    <div id="room18-error" class="h-8 mt-4 text-red-400 font-bold opacity-0 transition-opacity">Os dados visuais não batem com a tabela!</div>
                </div>
            `;
        }

        function changeBar(index, delta) {
            chartBars[index] += delta;
            if(chartBars[index] < 0) chartBars[index] = 0;
            if(chartBars[index] > 50) chartBars[index] = 50;
            renderRoom18();
        }

        function checkRoom18() {
            if(chartBars[0] === 30 && chartBars[1] === 10 && chartBars[2] === 40) {
                showModal("Dados Corretos!", "Excelente! Você interpretou a tabela e ajustou o gráfico de colunas perfeitamente.", "📈", "Próxima Sala ➔");
            } else {
                const err = document.getElementById('room18-error');
                err.classList.remove('opacity-0');
                setTimeout(() => err.classList.add('opacity-0'), 3000);
            }
        }

        // STAGE 19: LÓGICA ESPACIAL (Mini Labirinto / Cadeado Direcional)
        function renderRoom19() {
            let cmdIcons = {'U':'⬆️', 'D':'⬇️', 'L':'⬅️', 'R':'➡️'};
            let screenHTML = padLockPath.map(c => `<span class="bg-slate-700 text-white px-2 py-1 rounded mx-1">${cmdIcons[c]}</span>`).join('');
            if(screenHTML === '') screenHTML = '<span class="text-slate-500">_ _ _ _</span>';

            container.innerHTML = `
                <div class="w-full max-w-3xl flex flex-col items-center">
                    <div class="bg-slate-800/80 p-6 md:p-8 rounded-3xl border border-indigo-500/30 text-center mb-6 w-full shadow-xl">
                        <h2 class="text-3xl text-emerald-400 font-title mb-4 flex items-center justify-center gap-2"><span>🤖</span> O Cadeado Direcional</h2>
                        <p class="text-lg text-slate-200">
                            Programe a rota exata de 4 passos para o robô sair do início (A) e chegar na meta (B), desviando dos buracos (X).
                        </p>
                    </div>

                    <div class="flex flex-col md:flex-row gap-8 items-center w-full justify-center">
                        <!-- Mapa -->
                        <div class="bg-slate-900 border-4 border-slate-700 p-4 rounded-2xl relative w-48 h-48 flex items-center justify-center text-2xl shadow-xl">
                            <div class="grid grid-cols-3 grid-rows-3 gap-2 w-full h-full text-center">
                                <div class="bg-slate-800 rounded flex items-center justify-center border border-slate-600"></div>
                                <div class="bg-slate-800 rounded flex items-center justify-center border border-slate-600"></div>
                                <div class="bg-emerald-600/30 rounded flex items-center justify-center border-2 border-emerald-500 text-emerald-400 font-bold">B</div>
                                
                                <div class="bg-slate-800 rounded flex items-center justify-center border border-slate-600"></div>
                                <div class="bg-red-900/50 rounded flex items-center justify-center border border-red-500 text-sm">X</div>
                                <div class="bg-slate-800 rounded flex items-center justify-center border border-slate-600"></div>
                                
                                <div class="bg-indigo-600/30 rounded flex items-center justify-center border-2 border-indigo-500 text-indigo-400 font-bold">A</div>
                                <div class="bg-red-900/50 rounded flex items-center justify-center border border-red-500 text-sm">X</div>
                                <div class="bg-slate-800 rounded flex items-center justify-center border border-slate-600"></div>
                            </div>
                        </div>

                        <!-- Controle -->
                        <div class="bg-slate-900 border-4 border-slate-700 p-6 rounded-3xl shadow-2xl flex flex-col items-center">
                            <div class="h-12 w-full bg-slate-950 border-2 border-slate-800 rounded-lg mb-6 flex items-center justify-center text-xl overflow-hidden px-2 whitespace-nowrap min-w-[160px]">
                                ${screenHTML}
                            </div>
                            <div class="grid grid-cols-3 gap-2 mb-4">
                                <div></div>
                                <button onclick="addCmd('U')" class="bg-slate-700 hover:bg-slate-500 text-2xl w-12 h-12 rounded-lg active:scale-95 shadow-md">⬆️</button>
                                <div></div>
                                <button onclick="addCmd('L')" class="bg-slate-700 hover:bg-slate-500 text-2xl w-12 h-12 rounded-lg active:scale-95 shadow-md">⬅️</button>
                                <button onclick="addCmd('D')" class="bg-slate-700 hover:bg-slate-500 text-2xl w-12 h-12 rounded-lg active:scale-95 shadow-md">⬇️</button>
                                <button onclick="addCmd('R')" class="bg-slate-700 hover:bg-slate-500 text-2xl w-12 h-12 rounded-lg active:scale-95 shadow-md">➡️</button>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="padLockPath=[]; renderRoom19();" class="text-slate-400 text-sm underline px-2 py-1">Limpar</button>
                                <button onclick="checkRoom19()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded shadow-md">Testar</button>
                            </div>
                        </div>
                    </div>
                    <div id="room19-error" class="h-8 mt-6 text-red-400 font-bold opacity-0 transition-opacity">A rota bateu num obstáculo, parede, ou não chegou no B.</div>
                </div>
            `;
        }
        function addCmd(c) {
            if(padLockPath.length < 4) {
                padLockPath.push(c);
                renderRoom19();
            }
        }
        function checkRoom19() {
            // Valid path from bottom-left (0,0) to top-right (2,2) with traps at (1,0) and (1,1).
            // Safest 4-step path: UP, UP, RIGHT, RIGHT -> 'U','U','R','R'
            const valid = padLockPath.join('') === 'UURR';
            if(valid) {
                showModal("Rota Segura!", "Lógica perfeita! Você evitou os obstáculos e chegou ao destino guiando os passos.", "🤖", "Último Desafio ➔");
            } else {
                padLockPath = [];
                const err = document.getElementById('room19-error');
                err.classList.remove('opacity-0');
                setTimeout(() => { err.classList.add('opacity-0'); renderRoom19(); }, 3000);
            }
        }

        // STAGE 20: O GRANDE ENIGMA FINAL (Criptograma / Expressão Numérica)
        function renderRoom20() {
            let dialsHTML = '';
            for(let i=0; i<2; i++) {
                dialsHTML += `
                    <div class="flex flex-col items-center bg-slate-800 p-3 md:p-6 rounded-2xl border-4 border-slate-700 shadow-inner w-20 md:w-28">
                        <button onclick="changeBossDial(${i}, 1)" class="w-full h-10 md:h-12 bg-slate-700 hover:bg-indigo-600 rounded-t-lg flex items-center justify-center text-2xl transition-colors active:bg-indigo-400">▲</button>
                        <div class="h-20 md:h-24 w-full flex items-center justify-center bg-slate-900 border-y-2 border-slate-950 shadow-inner">
                            <span class="text-5xl md:text-6xl font-title text-red-400 font-bold">${bossDials[i]}</span>
                        </div>
                        <button onclick="changeBossDial(${i}, -1)" class="w-full h-10 md:h-12 bg-slate-700 hover:bg-indigo-600 rounded-b-lg flex items-center justify-center text-2xl transition-colors active:bg-indigo-400">▼</button>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="w-full max-w-4xl flex flex-col items-center animate-float" style="animation-duration: 5s;">
                    <div class="bg-gradient-to-b from-slate-900 to-red-950 p-6 md:p-10 rounded-[2rem] border-8 border-red-900 shadow-[0_0_80px_rgba(153,27,27,0.5)] text-center w-full relative">
                        <div class="absolute -top-8 left-1/2 transform -translate-x-1/2 text-5xl md:text-6xl">🔥</div>
                        <h2 class="text-3xl md:text-4xl text-white font-title mb-4 mt-6 drop-shadow-md">O Grande Enigma Final</h2>
                        <p class="text-lg md:text-xl text-red-200 mb-6 font-bold">
                            Descubra o valor final. Lembre-se da regra de ouro: multiplicações primeiro!
                        </p>
                        
                        <div class="bg-slate-900/80 p-6 rounded-2xl border-2 border-red-800/50 inline-block text-2xl md:text-3xl font-bold text-slate-200 mb-8 w-full max-w-md">
                            <div class="mb-3">🍎 + 🍎 + 🍎 = 30</div>
                            <div class="mb-3">🍎 + 🍌 + 🍌 = 18</div>
                            <div class="mb-3">🍌 - 🍒 = 2</div>
                            <div class="mt-6 pt-4 border-t-2 border-slate-700 text-yellow-400 text-3xl md:text-4xl">
                                🍒 + 🍎 × 🍌 = ?
                            </div>
                        </div>

                        <div class="flex justify-center gap-4 md:gap-8 bg-slate-900/50 p-6 rounded-3xl mx-auto w-fit">
                            ${dialsHTML}
                        </div>
                        <div id="room20-error" class="h-8 mt-6 text-red-400 font-bold text-lg opacity-0 transition-opacity">A senha mestra está incorreta! Revise seus cálculos.</div>
                    </div>
                </div>
            `;
        }

        function changeBossDial(index, delta) {
            bossDials[index] += delta;
            if (bossDials[index] > 9) bossDials[index] = 0;
            if (bossDials[index] < 0) bossDials[index] = 9;
            renderRoom20();
            
            // Maca = 10. Banana = 4. Cereja = 2.
            // 2 + 10 * 4 = 42. (Dials: [4, 2])
            if (bossDials[0] === 4 && bossDials[1] === 2) {
                setTimeout(() => nextStage(), 800); // direct to win
            }
        }


        // ======================= WIN SCREEN (STAGE 21) ======================= //

        function renderWin() {
            document.getElementById('progress-container').classList.add('hidden');

            container.innerHTML = `
                <div class="text-center max-w-2xl bg-slate-800/80 p-10 rounded-3xl border-2 border-yellow-500/50 shadow-[0_0_50px_rgba(234,179,8,0.3)] relative overflow-hidden">
                    <div class="absolute inset-0 pointer-events-none opacity-50 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-500/20 via-transparent to-transparent"></div>
                    
                    <div class="text-8xl mb-6 animate-float">🎓🏆</div>
                    <h1 class="text-5xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-6 font-title drop-shadow-md">
                        Você Escapou!
                    </h1>
                    <p class="text-xl md:text-2xl text-slate-300 mb-8 leading-relaxed">
                        Parabéns! Você provou que é uma <strong class="text-yellow-400">LENDA DA MATEMÁTICA</strong> do 5º ano.<br>
                        Sobreviveu a incríveis 20 enigmas passando por conversão de medidas, gráficos, geometria espacial, frações, múltiplos e expressões numéricas!
                    </p>
                    <button onclick="resetGame()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-title text-xl py-4 px-10 rounded-full shadow-lg hover:shadow-green-500/50 transition-all transform hover:scale-105">
                        Jogar Novamente ↺
                    </button>
                </div>
            `;
            
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#facc15', '#38bdf8', '#fbbf24', '#a855f7', '#4ade80'];
            for(let i=0; i<80; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.width = Math.random() * 10 + 5 + 'px';
                conf.style.height = Math.random() * 20 + 10 + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.top = '-20px';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.opacity = Math.random();
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                conf.style.zIndex = 100;
                conf.style.transition = `top ${Math.random() * 3 + 2}s linear, transform ${Math.random() * 3 + 2}s ease-in-out`;
                document.body.appendChild(conf);

                setTimeout(() => {
                    conf.style.top = '120vh';
                    conf.style.transform = `rotate(${Math.random() * 720}deg) translateX(${Math.random() * 100 - 50}px)`;
                }, 50);

                setTimeout(() => conf.remove(), 5000);
            }
        }

        // Inicia o Jogo
        renderStage();

    </script>
</body>
</html>
